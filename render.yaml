services:
  - type: web
    name: aoi-v3-backend
    runtime: node
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: bun install
    startCommand: bun run src/main.ts
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22.13.1
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_OAUTH_CLIENT_ID
        sync: false
      - key: DISCORD_OAUTH_CLIENT_SECRET
        sync: false
      - key: DISCORD_OAUTH_REDIRECT_URI
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: GUILD_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: OPERATIONAL_QUEUE_CONCURRENCY
        value: "1"
  - type: web
    name: aoi-v3-landing
    runtime: node
    rootDir: landing
    plan: free
    autoDeploy: true
    buildCommand: bun install && bun run build
    startCommand: bun run start
    envVars:
      - key: NODE_VERSION
        value: 22.13.1
      - key: BACKEND_API_URL
        sync: false
      - key: FRONTEND_APP_URL
        sync: false
      - key: DISCORD_REDIRECT_URI
        sync: false
      - key: NEXT_PUBLIC_DASHBOARD_URL
        sync: false
